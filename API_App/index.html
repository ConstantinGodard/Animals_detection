<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animal Classification</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; padding: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 0.4rem; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 2rem; line-height: 1.6; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 800px; }
  .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.25rem; }
  .card-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  #preview { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; display: none; }
  .placeholder { width: 100%; aspect-ratio: 1; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.85rem; flex-direction: column; gap: 0.5rem; }
  .upload-btn { display: block; width: 100%; margin-top: 1rem; padding: 0.6rem; border: 1px dashed #ccc; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; color: #555; background: none; }
  .upload-btn:hover { background: #f5f5f5; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bar-rank { font-size: 12px; color: #aaa; width: 14px; }
  .bar-names { display: flex; flex-direction: column; width: 150px; flex-shrink: 0; }
  .bar-common { font-size: 13px; color: #111; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-latin { font-size: 11px; color: #aaa; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .bar-pct { font-size: 12px; color: #555; width: 40px; text-align: right; flex-shrink: 0; }
  .empty { color: #aaa; font-size: 0.85rem; padding: 2rem 0; text-align: center; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 1rem; }
  .stat { background: #f8f8f8; border-radius: 8px; padding: 8px 12px; }
  .stat-val { font-size: 1.1rem; font-weight: 500; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }
  input[type=file] { display: none; }
</style>
</head>
<body>
<h1>Few-shot animal classification</h1>
<p class="subtitle">MobileNetV2 backbone · 3.4M parameters pre-trained on ImageNet · 1280-dim embeddings · cosine similarity · 150 classes</p>

<div class="grid">
  <div class="card">
    <div class="card-label">Input image</div>
    <div class="placeholder" id="placeholder">📷 No image yet</div>
    <img id="preview" alt="preview">
    <label class="upload-btn" for="file-input">Upload an image</label>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="card">
    <div class="card-label">Top 5 predictions</div>
    <div id="bars"><div class="empty">Upload an image to see predictions</div></div>
    <div class="stats">
      <div class="stat"><div class="stat-val">150</div><div class="stat-lbl">Classes</div></div>
      <div class="stat"><div class="stat-val">1280</div><div class="stat-lbl">Embedding dim</div></div>
      <div class="stat"><div class="stat-val">3.4M</div><div class="stat-lbl">Parameters</div></div>
    </div>
  </div>
</div>

<script>
const colors = ['#1D9E75','#378ADD','#7F77DD','#D85A30','#888780'];

document.getElementById('file-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('placeholder').style.display = 'none';
    const img = document.getElementById('preview');
    img.src = ev.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);

  const formData = new FormData();
  formData.append('file', file);
  document.getElementById('bars').innerHTML = '<div class="empty">Predicting...</div>';

  const res = await fetch('/predict', { method: 'POST', body: formData });
  const data = await res.json();
  const preds = data.predictions;
  const max = preds[0].confidence;

  document.getElementById('bars').innerHTML = preds.map((p, i) => `
    <div class="bar-row">
      <span class="bar-rank">${i+1}</span>
      <div class="bar-names">
        <span class="bar-common" title="${p.common_name}">${p.common_name}</span>
        <span class="bar-latin" title="${p.class}">${p.class}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(p.confidence/max*100).toFixed(1)}%; background:${colors[i]};"></div>
      </div>
      <span class="bar-pct">${(p.confidence*100).toFixed(1)}%</span>
    </div>
  `).join('');
});
</script>
</body>
</html>
